services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: api_testing
      POSTGRES_USER: api_testing
      POSTGRES_PASSWORD: api_testing
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_testing -d api_testing"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
    command: python -m uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8001
    environment:
      AUTH_SHARED_SECRET: local-dev-shared-secret
      AUTH_ISSUER: api-testing-auth
      AUTH_AUDIENCE: api-testing-api
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  notification-service:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
    command: python -m uvicorn services.notification_service.main:app --host 0.0.0.0 --port 8002
    environment:
      TEST_RESET_API_KEY: demo-reset-key
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-service:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://api_testing:api_testing@postgres:5432/api_testing
      AUTH_SHARED_SECRET: local-dev-shared-secret
      AUTH_ISSUER: api-testing-auth
      AUTH_AUDIENCE: api-testing-api
      NOTIFICATION_SERVICE_URL: http://notification-service:8002
      TEST_RESET_API_KEY: demo-reset-key
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles: ["security"]
    depends_on:
      api-service:
        condition: service_healthy
    command: >
      zap-baseline.py
      -t http://api-service:8000/dashboard
      -r zap-report.html
      -J zap-report.json
      -m 2
    volumes:
      - ./reports/zap:/zap/wrk

volumes:
  postgres-data:
